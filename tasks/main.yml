---
- name: Install Docker
  become: true
  tags: install
  block:

    - name: Install dependencies
      package:
        name:
          - ca-certificates
          - curl
          - gnupg

    - name: Read /etc/os-release
      ansible.builtin.slurp:
        src: /etc/os-release
      register: _os_release_raw

    - name: Resolve Docker repository distro and codename
      set_fact:
        _docker_distro: "{{ 'ubuntu' if ansible_distribution == 'Ubuntu' else 'debian' }}"
        _docker_codename: >-
          {{
            (_os_release_raw.content | b64decode)
            | regex_search('(?m)^VERSION_CODENAME=(.+)$', '\\1')
            | first
            | lower
          }}

    - name: Add APT key
      ansible.builtin.apt_key:
        url: 'https://download.docker.com/linux/{{ _docker_distro }}/gpg'
        state: present

    - name: Add APT repository
      ansible.builtin.apt_repository:
        repo: 'deb https://download.docker.com/linux/{{ _docker_distro }} {{ _docker_codename }} stable'
        state: present
      notify: apt update

    - name: Install Docker
      package:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin

    - name: Ensure Docker is enabled and started
      service:
        name: docker
        enabled: true
        state: started

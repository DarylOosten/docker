---
- name: Install Docker
  become: true
  tags: install
  block:

    - name: Set Debian codename for LMDE
      set_fact:
        docker_repo_codename: "{{ ansible_facts['lsb']['upstream_codename'] }}"
      when: ansible_distribution == 'Linux Mint Debian Edition'

    - name: Set Debian codename for plain Debian
      set_fact:
        docker_repo_codename: "{{ ansible_distribution_release }}"
      when: ansible_distribution == 'Debian'

    - name: Install dependencies
      package:
        name:
          - ca-certificates
          - curl
          - gnupg

    - name: Add APT key
      ansible.builtin.apt_key:
        url: 'https://download.docker.com/linux/debian/gpg'
        state: present

    - name: Add APT repository
      ansible.builtin.apt_repository:
        repo: 'deb https://download.docker.com/linux/debian {{ docker_repo_codename }} stable'
        state: present
      notify: apt update

    - name: Install Docker
      package:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin

    - name: Ensure Docker is enabled and started
      service:
        name: docker
        enabled: true
        state: started
